            border-radius: 8px;

    </style>
</head>

                    parsed.search = "";
                    parsed.hash = "";
                    baseHref = parsed.href.slice(0, parsed.href.lastIndexOf("/") + 1);
                } catch (error) {
                }

                const baseTag = '<base href="' + escapeAttribute(baseHref) + '">';
                if (/<head[^>]*>/i.test(html)) {
                    return html.replace(/<head[^>]*>/i, match => match + baseTag);
                }
                return baseTag + html;
            }

            function getTags(zone) {
                return Array.isArray(zone.special) ? zone.special.filter(Boolean) : [];
            }

            function normalizeZone(zone, index) {
                return {
                    ...zone,
                    id: zone.id ?? index,
                    name: String(zone.name || "untitled game"),
                    author: String(zone.author || "GNMath"),
                    featured: Boolean(zone.featured)
                };
            }

            function findZoneById(id) {
                return zones.find(zone => String(zone.id) === String(id));
            }

            function setLoading(message) {
                loading = true;
                el.loader.textContent = message || "loading...";
                el.refreshCatalog.disabled = true;
            }

            function clearLoading(message) {
                loading = false;
                el.loader.textContent = message || "";
                el.refreshCatalog.disabled = false;
            }

            async function resolveZonesUrl() {
                try {
                    const response = await fetch(cacheBust("https://api.github.com/repos/freebuisness/assets/commits"), {
                        cache: "no-store"
                    });
                    if (response.ok) {
                        const commits = await response.json();
                        const sha = commits?.[0]?.sha;
                        if (sha) return "https://cdn.jsdelivr.net/gh/freebuisness/assets@" + sha + "/zones.json";
                    }
                } catch (error) {
                    try {
                        const response = await fetch(cacheBust("https://raw.githubusercontent.com/freebuisness/xml/refs/heads/main/sha.txt"), {
                            cache: "no-store"
                        });
                        if (response.ok) {
                            const sha = (await response.text()).trim();
                            if (sha) return "https://cdn.jsdelivr.net/gh/freebuisness/assets@" + sha + "/zones.json";
                        }
                    } catch (secondaryError) {
                    }
                }

                return ZONES_URLS[Math.floor(Math.random() * ZONES_URLS.length)];
            }

            async function appendMissingHtmlZones(baseZones) {
                try {
                    const knownIds = new Set(baseZones.map(zone => String(zone.id)));
                    const response = await fetch(cacheBust(HTML_TREE_URL), { cache: "no-store" });
                    if (!response.ok) return baseZones;

                    const tree = await response.json();
                    const missingIds = [...new Set((tree.tree || [])
                        .filter(file => file.type === "blob" && /^[0-9]+\.html$/.test(file.path))
                        .map(file => file.path.replace(".html", ""))
                        .filter(id => !knownIds.has(id)))]
                        .sort((a, b) => Number(a) - Number(b));

                    if (!missingIds.length) return baseZones;

                    const extras = await Promise.all(missingIds.map(createFallbackZone));
                    return baseZones.concat(extras.filter(Boolean));
                } catch (error) {
                    return baseZones;
                }
            }

            async function createFallbackZone(id) {
                let name = "GNMath Game " + id;

                try {
                    const response = await fetch(cacheBust(HTML_URL + "/" + id + ".html"), { cache: "no-store" });
                    if (response.ok) {
                        name = getHtmlTitle(await response.text()) || name;
                    }
                } catch (error) {
                }

                return {
                    id: Number(id),
                    name,
                    author: "GNMath",
                    url: "{HTML_URL}/" + id + ".html",
                    cover: "{COVER_URL}/" + id + ".png",
                    special: ["extra"]
                };
            }

            function getHtmlTitle(html) {
                const match = String(html).match(/<title[^>]*>([\s\S]*?)<\/title>/i);
                const title = match?.[1]?.replace(/\s+/g, " ").trim();
                if (!title) return "";

                const decoder = document.createElement("textarea");
                decoder.innerHTML = title;
                return decoder.value;
            }

            async function loadZones() {
                if (loading) return;
                setLoading("loading GNMath catalog...");

                try {
                    const zonesUrl = await resolveZonesUrl();
                    const response = await fetch(cacheBust(zonesUrl), { cache: "no-store" });
                    if (!response.ok) throw new Error("catalog returned " + response.status);

                    const json = await response.json();
                    if (!Array.isArray(json)) throw new Error("catalog was not a list");

                    zones = json
                        .filter(zone => zone && zone.name && zone.url)
                        .map(normalizeZone);
                    if (zones[0]) zones[0].featured = true;
                    zones = await appendMissingHtmlZones(zones);

                    populateTags();
                    renderRecent();
                    render();
                    clearLoading(zones.length ? "" : "no games found");
                    openRequestedGame();
                    fetchAllPopularity();
                } catch (error) {
                    zones = [];
                    currentList = [];
                    render();
                    clearLoading("failed to load games");
                    el.gameCount.textContent = "GNMath catalog failed to load";
                    console.error(error);
                }
            }

            async function fetchAllPopularity() {
                await Promise.all(["year", "month", "week", "day"].map(fetchPopularity));
                if (["popular", "month", "week", "day"].includes(el.sort.value)) render();
            }

            async function fetchPopularity(duration) {
                try {
                    const response = await fetch("https://data.jsdelivr.com/v1/stats/packages/gh/freebuisness/html@main/files?period=" + duration + "&limit=1000");
                    if (!response.ok) return;

                    const data = await response.json();
                    if (!Array.isArray(data)) return;

                    data.forEach(file => {
                        const idMatch = String(file.name || "").match(/\/(\d+)\.html$/);
                        if (!idMatch) return;
                        popularity[duration][Number(idMatch[1])] = file.hits?.total ?? 0;
                    });
                } catch (error) {
                }
            }

            function populateTags() {
                const selected = el.tagFilter.value;
                const tags = [...new Set(zones.flatMap(getTags))].sort((a, b) => a.localeCompare(b));

                el.tagFilter.innerHTML = "";
                const all = document.createElement("option");
                all.value = "";
                all.textContent = "all tags";
                el.tagFilter.appendChild(all);

                tags.forEach(tag => {
                    const option = document.createElement("option");
                    option.value = tag;
                    option.textContent = tag.replace(/\b\w/g, letter => letter.toUpperCase());
                    el.tagFilter.appendChild(option);
                });

                if (tags.includes(selected)) el.tagFilter.value = selected;
            }

            function getFilteredZones() {
                const query = el.search.value.trim().toLowerCase();
                const tag = el.tagFilter.value;

                return zones.filter(zone => {
                    const matchesQuery = !query ||
                        zone.name.toLowerCase().includes(query) ||
                        zone.author.toLowerCase().includes(query) ||
                        getTags(zone).some(item => item.toLowerCase().includes(query));
                    const matchesTag = !tag || getTags(zone).includes(tag);
                    return matchesQuery && matchesTag;
                });
            }

            function sortZones(list) {
                const sorted = [...list];
                const score = duration => zone => popularity[duration]?.[Number(zone.id)] ?? 0;

                if (el.sort.value === "newest") {
                    sorted.sort((a, b) => Number(b.id) - Number(a.id));
                } else if (el.sort.value === "oldest") {
                    sorted.sort((a, b) => Number(a.id) - Number(b.id));
                } else if (el.sort.value === "popular") {
                    sorted.sort((a, b) => score("year")(b) - score("year")(a) || a.name.localeCompare(b.name));
                } else if (el.sort.value === "month") {
                    sorted.sort((a, b) => score("month")(b) - score("month")(a) || a.name.localeCompare(b.name));
                } else if (el.sort.value === "week") {
                    sorted.sort((a, b) => score("week")(b) - score("week")(a) || a.name.localeCompare(b.name));
                } else if (el.sort.value === "day") {
                    sorted.sort((a, b) => score("day")(b) - score("day")(a) || a.name.localeCompare(b.name));
                } else {
                    sorted.sort((a, b) => a.name.localeCompare(b.name));
                }

                return sorted;
            }

            function render() {
                currentList = sortZones(getFilteredZones());
                renderFeatured();
                renderGrid(currentList);
                updateStatus();
                observeImages();
            }

            function renderFeatured() {
                const queryActive = el.search.value.trim() || el.tagFilter.value;
                const featured = queryActive ? [] : zones.filter(zone => zone.featured).slice(0, 14);

                el.featured.innerHTML = "";
                el.featuredSection.hidden = featured.length === 0;
                el.featuredCount.textContent = featured.length ? featured.length + " picks" : "";

                featured.forEach(zone => el.featured.appendChild(createCard(zone)));
            }

            function renderGrid(list) {
                el.grid.innerHTML = "";
                list.forEach(zone => el.grid.appendChild(createCard(zone)));
                el.loader.textContent = list.length ? "" : "no games found";
            }

            function updateStatus() {
                const query = el.search.value.trim();
                const tag = el.tagFilter.value;
                const parts = [];
                if (query) parts.push('search "' + query + '"');
                if (tag) parts.push("tag " + tag);

                el.clearSearch.style.display = query ? "flex" : "none";
                el.gameCount.textContent = currentList.length.toLocaleString() + " of " + zones.length.toLocaleString() + " GNMath games";
                el.activeFilter.textContent = parts.length ? parts.join(" / ") : "showing everything";
            }

            function createCard(zone) {
                const card = document.createElement("button");
                card.type = "button";
                card.className = "card";
                card.title = zone.name;

                const img = document.createElement("img");
                img.dataset.src = getCoverUrl(zone);
                img.alt = "";
                img.loading = "lazy";
                img.decoding = "async";

                const title = document.createElement("span");
                title.textContent = zone.name;

                const meta = document.createElement("small");
                meta.textContent = zone.author || "GNMath";

                card.append(img, title, meta);
                card.addEventListener("click", () => {
                    card.classList.remove("clicked");
                    void card.offsetWidth;
                    card.classList.add("clicked");
                    window.setTimeout(() => openZone(zone), 110);
                });

                return card;
            }

            function observeImages() {
                if (imageObserver) imageObserver.disconnect();
                const images = Array.from(document.querySelectorAll("img[data-src]"));

                if (!("IntersectionObserver" in window)) {
                    images.forEach(loadImage);
                    return;
                }

                imageObserver = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (!entry.isIntersecting) return;
                        loadImage(entry.target);
                        imageObserver.unobserve(entry.target);
                    });
                }, { rootMargin: "900px" });

                images.forEach((image, index) => {
                    if (index < 48) {
                        image.loading = "eager";
                        if ("fetchPriority" in image) image.fetchPriority = index < 18 ? "high" : "auto";
                        loadImage(image);
                        return;
                    }

                    imageObserver.observe(image);
                });
            }

            function loadImage(image) {
                image.src = image.dataset.src;
                image.removeAttribute("data-src");
            }

            function renderRecent() {
                recent = recent.slice(0, 6);
                writeRecent();

                el.recent.innerHTML = "";
                el.recentSection.hidden = recent.length === 0;

                recent.forEach(item => {
                    const zone = findZoneById(item.id) || item;
                    const button = document.createElement("button");
                    button.type = "button";
                    button.textContent = zone.name;
                    button.title = zone.name;
                    button.addEventListener("click", () => openZone(zone));
                    el.recent.appendChild(button);
                });
            }

            function addRecent(zone) {
                recent = recent.filter(item => String(item.id) !== String(zone.id));
                recent.unshift({
                    id: zone.id,
                    name: zone.name,
                    author: zone.author,
                    url: zone.url,
                    cover: zone.cover,
                    special: zone.special
                });
                recent = recent.slice(0, 6);
                writeRecent();
                renderRecent();
            }

            function resetFrame() {
                const nextFrame = document.createElement("iframe");
                nextFrame.id = "gameFrame";
                nextFrame.title = "Game";
                gameFrame.replaceWith(nextFrame);
                gameFrame = nextFrame;
            }

            async function openZone(zone, options = {}) {
                const shouldPush = options.push !== false;
                activeZone = zone;
                addRecent(zone);

                const gameUrl = getGameUrl(zone);
                if (gameUrl.startsWith("http") && !gameUrl.includes("cdn.jsdelivr.net/gh/freebuisness/html")) {
                    window.open(gameUrl, "_blank", "noopener");
                    return;
                }

                document.body.classList.add("viewer-open");
                el.player.classList.add("active");
                el.player.setAttribute("aria-hidden", "false");
                el.gameName.textContent = zone.name;
                el.gameMeta.textContent = "loading from GNMath" + (zone.author ? " / by " + zone.author : "");
                resetFrame();

                try {
                    const response = await fetch(cacheBust(gameUrl), { cache: "no-store" });
                    if (!response.ok) throw new Error("game returned " + response.status);

                    const html = htmlWithBase(await response.text(), gameUrl);
                    gameFrame.contentDocument.open();
                    gameFrame.contentDocument.write(html);
                    gameFrame.contentDocument.close();

                    el.gameMeta.textContent = "GNMath game" + (zone.author ? " / by " + zone.author : "");
                    if (shouldPush) pushGameUrl(zone.id);
                } catch (error) {
                    const message = "<!doctype html><style>body{margin:0;background:#111214;color:#eceeef;font:16px Arial;display:grid;place-items:center;height:100vh;text-align:center;padding:20px}</style><div><h1>game failed to load</h1><p>" + String(error.message || error) + "</p></div>";
                    gameFrame.contentDocument.open();
                    gameFrame.contentDocument.write(message);
                    gameFrame.contentDocument.close();
                    el.gameMeta.textContent = "failed to load";
                }
            }

            function pushGameUrl(id) {
                try {
                    const url = new URL(window.location.href);
                    url.searchParams.set("id", id);
                    history.pushState({ gameId: String(id) }, "", url.toString());
                } catch (error) {
                }
            }

            function clearGameUrl() {
                try {
                    const url = new URL(window.location.href);
                    url.searchParams.delete("id");
                    history.pushState(null, "", url.toString());
                } catch (error) {
                }
            }

            function closeZone(options = {}) {
                activeZone = null;
                el.player.classList.remove("active");
                el.player.setAttribute("aria-hidden", "true");
                document.body.classList.remove("viewer-open");
                resetFrame();
                if (options.push !== false) clearGameUrl();
            }

            function openRequestedGame() {
                try {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get("id");
                    if (!id) return;

                    const zone = findZoneById(id);
                    if (zone) openZone(zone, { push: false });
                } catch (error) {
                }
            }

            async function fetchActiveGameHtml() {
                if (!activeZone) throw new Error("no active game");
                const response = await fetch(cacheBust(getGameUrl(activeZone)), { cache: "no-store" });
                if (!response.ok) throw new Error("game returned " + response.status);
                return response.text();
            }

            async function openActiveInNewTab() {
                if (!activeZone) return;

                const gameUrl = getGameUrl(activeZone);
                const newWindow = window.open("about:blank", "_blank");
                if (!newWindow) {
                    alert("Popup blocked. Allow popups and try again.");
                    return;
                }

                try {
                    const html = htmlWithBase(await fetchActiveGameHtml(), gameUrl);
                    newWindow.document.open();
                    newWindow.document.write(html);
                    newWindow.document.close();
                } catch (error) {
                    newWindow.location.href = gameUrl;
                }
            }

            async function downloadActiveGame() {
                if (!activeZone) return;

                try {
                    const html = await fetchActiveGameHtml();
                    const blob = new Blob([html], { type: "text/html;charset=utf-8" });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement("a");
                    link.href = url;
                    link.download = activeZone.name.replace(/[\\/:*?"<>|]+/g, "-") + ".html";
                    document.body.appendChild(link);
                    link.click();
                    link.remove();
                    URL.revokeObjectURL(url);
                } catch (error) {
                    alert("Download failed: " + error.message);
                }
            }

            function fullscreenActiveGame() {
                if (gameFrame.requestFullscreen) {
                    gameFrame.requestFullscreen();
                } else if (gameFrame.webkitRequestFullscreen) {
                    gameFrame.webkitRequestFullscreen();
                } else if (gameFrame.msRequestFullscreen) {
                    gameFrame.msRequestFullscreen();
                }
            }

            function openSettings() {
                el.modalBody.innerHTML = "";

                const grid = document.createElement("div");
                grid.className = "settingsGrid";

                const refresh = document.createElement("button");
                refresh.type = "button";
                refresh.className = "wideButton";
                refresh.textContent = "refresh GNMath catalog";
                refresh.addEventListener("click", () => {
                    closeSettings();
                    loadZones();
                });

                const clear = document.createElement("button");
                clear.type = "button";
                clear.className = "wideButton";
                clear.textContent = "clear recently played";
                clear.addEventListener("click", () => {
                    recent = [];
                    writeRecent();
                    renderRecent();
                });

                grid.append(refresh, clear);
                el.modalBody.append(grid);
                el.modalOverlay.classList.add("active");
            }

            function closeSettings() {
                el.modalOverlay.classList.remove("active");
            }

            function bindEvents() {
                el.search.addEventListener("input", () => {
                    clearTimeout(searchTimer);
                    searchTimer = window.setTimeout(render, 160);
                    el.clearSearch.style.display = el.search.value ? "flex" : "none";
                });

                el.clearSearch.addEventListener("click", () => {
                    el.search.value = "";
                    el.search.focus();
                    render();
                });

                el.sort.addEventListener("change", render);
                el.tagFilter.addEventListener("change", render);
                el.refreshCatalog.addEventListener("click", loadZones);
                el.settingsButton.addEventListener("click", openSettings);
                el.modalClose.addEventListener("click", closeSettings);
                el.modalOverlay.addEventListener("click", event => {
                    if (event.target === el.modalOverlay) closeSettings();
                });

                el.randomGame.addEventListener("click", () => {
                    const pool = currentList.length ? currentList : zones;
                    if (!pool.length) return;
                    openZone(pool[Math.floor(Math.random() * pool.length)]);
                });

                el.backUp.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
                el.closeGame.addEventListener("click", closeZone);
                el.fullscreenGame.addEventListener("click", fullscreenActiveGame);
                el.newTabGame.addEventListener("click", openActiveInNewTab);
                el.downloadGame.addEventListener("click", downloadActiveGame);

                window.addEventListener("scroll", () => {
                    el.backUp.style.display = window.scrollY > 650 ? "inline-flex" : "none";
                });

                window.addEventListener("keydown", event => {
                    if (event.key === "`") {
                        event.preventDefault();
                        window.location.href = "https://classroom.google.com";
                    } else if (event.key === "Escape") {
                        if (el.modalOverlay.classList.contains("active")) closeSettings();
                        else if (activeZone) closeZone();
                    }
                });

                window.addEventListener("popstate", () => {
                    const id = new URLSearchParams(window.location.search).get("id");
                    if (!id && activeZone) closeZone({ push: false });
                    if (id && (!activeZone || String(activeZone.id) !== String(id))) {
                        const zone = findZoneById(id);
                        if (zone) openZone(zone, { push: false });
                    }
                });
            }

            setSlogan();
            bindEvents();
            renderRecent();
            loadZones();
        })();
    </script>
</body>

</html>
